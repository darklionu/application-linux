# Configuration pour l'interface graphique

## Framework graphique à utiliser

### Option 1 : SFML (Simple Fast Multimedia Library) ⭐ RECOMMANDÉ
# Avantages:
#   - Simple et léger
#   - Bon pour le dessin 2D
#   - Facile à installer
# Installation: sudo apt-get install libsfml-dev

### Option 2 : Qt
# Avantages:
#   - Très complet
#   - Cross-platform
#   - Production-ready
# Installation: sudo apt-get install qt5-default

### Option 3 : GTK
# Avantages:
#   - Standard Linux
#   - Bien intégré
# Installation: sudo apt-get install libgtk-3-dev

### Option 4 : Dear ImGui
# Avantages:
#   - UI immédiate (Immediate Mode GUI)
#   - Légère et flexible
# Installation: Nécessite compilation manuelle

## Recommandation
# Commencer avec SFML pour la simplicité
# Passer à Qt si besoin de plus de features

[GUI_FRAMEWORK]
framework = SFML
version = 2.5.1

[WINDOW]
default_width = 1200
default_height = 800
title = Agent Manager - Interface Graphique
fullscreen = false
vsync = true

[THEME]
background_color = #1e1e1e
primary_color = #0078d4
accent_color = #ff6b6b
text_color = #ffffff
panel_color = #2d2d30

[PANELS]
show_agents = true
show_logs = true
show_controls = true
show_menu = true

[AGENT_DISPLAY]
grid_layout = true
columns = 3
rows = 2
panel_width = 200
panel_height = 120

[REFRESH_RATE]
fps = 60
log_update_interval = 500  # ms
status_update_interval = 1000  # ms
