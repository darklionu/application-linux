<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecondCerveau3D - 3D Agent Orchestrator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1a3a52 100%);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }
        
        #root {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: linear-gradient(90deg, #0a0e27 0%, #1a2332 100%);
            border-bottom: 2px solid #00d4ff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 212, 255, 0.2);
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.connected {
            background: #4caf50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.6);
        }
        
        .status-indicator.disconnected {
            background: #ff6b6b;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.6);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        main {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }
        
        .sidebar {
            width: 320px;
            background: rgba(42, 42, 42, 0.8);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }
        
        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #00d4ff;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        select, textarea, input {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 10px;
            background: #3a3a3a;
            border: 1px solid #555;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
        }
        
        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Courier New', monospace;
        }
        
        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(90deg, #00d4ff 0%, #0099cc 100%);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 12px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 212, 255, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .update-log {
            margin-top: 25px;
            padding: 15px;
            background: rgba(10, 14, 39, 0.5);
            border: 1px solid #444;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .update-log h3 {
            font-size: 12px;
            color: #00d4ff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .update-item {
            font-size: 11px;
            padding: 5px 0;
            border-bottom: 1px solid #333;
            color: #ddd;
        }
        
        .canvas-container {
            flex: 1;
            background: linear-gradient(180deg, #0a0e27 0%, #1a1a2e 100%);
            border: 1px solid #444;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .canvas-stats {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 15px;
            border-radius: 4px;
            font-size: 11px;
            border-left: 3px solid #00d4ff;
            backdrop-filter: blur(5px);
        }
        
        .stat-line {
            margin: 3px 0;
        }
        
        .legend {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 15px;
            border-radius: 4px;
            font-size: 11px;
            backdrop-filter: blur(5px);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #2a2a2a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #00aacc;
        }
    </style>
</head>
<body>
    <div id="root">
        <header>
            <h1>🧠 SecondCerveau3D - Agent Orchestrator</h1>
            <div>
                <span class="status-indicator connected" id="statusIndicator"></span>
                <span id="statusText">Connected</span>
            </div>
        </header>
        
        <main>
            <div class="sidebar">
                <h2>⚙️ Task Control</h2>
                
                <div class="control-group">
                    <label>Select Agent</label>
                    <select id="agentSelect">
                        <option value="">-- Loading agents --</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>Task Configuration (JSON)</label>
                    <textarea id="taskData" placeholder='{"target": "192.168.1.1", "timeout": 5000}'></textarea>
                </div>
                
                <button onclick="submitTask()">Submit Task</button>
                
                <div class="update-log">
                    <h3>📋 Event Log</h3>
                    <div id="updateList"></div>
                </div>
            </div>
            
            <div class="canvas-container">
                <canvas id="canvas"></canvas>
                
                <div class="canvas-stats">
                    <div class="stat-line">📊 <strong>Nodes:</strong> <span id="nodeCount">0</span></div>
                    <div class="stat-line">🔗 <strong>Connections:</strong> <span id="edgeCount">0</span></div>
                    <div class="stat-line">⚠️ <strong>Threats:</strong> <span id="threatCount">0</span></div>
                </div>
                
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #00ff00;"></div>
                        <span>Safe</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #ffaa00;"></div>
                        <span>Medium Threat</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #ff0000;"></div>
                        <span>Critical</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="renderer.js"></script>
</body>
</html>
